name: roadpack
description: India-first road safety platform
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.11.0
  flutter: '>=3.41.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Backend
  supabase_flutter: ^2.9.0

  # Auth
  clerk_flutter: ^0.0.16-beta
  clerk_auth: ^0.0.16-beta
  google_sign_in: ^6.2.2

  # Local storage
  drift: ^2.23.1
  sqlite3_flutter_libs: ^0.5.28
  shared_preferences: ^2.5.3

  # Networking
  connectivity_plus: ^6.1.4

  # Location
  flutter_background_geolocation: ^4.17.3

  # Maps
  google_maps_flutter: ^2.12.1

  # Sensors (Phase 2 prep)
  sensors_plus: ^6.1.1

  # Utilities
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  intl: ^0.20.2
  uuid: ^4.5.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  drift_dev: ^2.23.1
  riverpod_lint: ^2.6.3
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true
